<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Segregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Shape Segregator</h1>
    <form id="shapeForm">
        <label for="sides">Number of sides:</label>
        <input type="number" id="sides" name="sides" required min="0"><br>
        <label for="symmetry">Number of symmetry axes:</label>
        <input type="number" id="symmetry" name="symmetry" required min="0"><br>
        <label for="ratio">Convex hull ratio (0-1):</label>
        <input type="number" id="ratio" name="ratio" step="0.01" min="0" max="1" required><br>
        <button type="submit">Classify</button>
    </form>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
